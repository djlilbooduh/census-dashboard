<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>📊 US Census & Crime Dashboard — All 50 States</title>
<style>
:root{--bg:#0a0a10;--sf:#141420;--bd:#1e1e3a;--tx:#e0e0f0;--mu:#8888aa;--ac:#4fc3f7;--sc:#ff5252;--cf:#ffab40;--uc:#66bb6a;--pl:#ce93d8}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'Segoe UI',system-ui,sans-serif;line-height:1.6}
header{background:linear-gradient(135deg,#0d1b2a,#1b2838,#0d1b2a);border-bottom:1px solid #1a1a3a;padding:1.5rem 2rem;text-align:center}
header h1{font-size:1.6rem;color:var(--ac);margin-bottom:.25rem}
header .sub{color:var(--mu);font-size:.75rem}
#stateBar{display:flex;justify-content:center;align-items:center;gap:.75rem;margin-top:.75rem;flex-wrap:wrap}
#stateBar select{background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:.45rem 1rem;border-radius:6px;font-size:.82rem;outline:none;cursor:pointer;min-width:220px}
#stateBar select:focus{border-color:var(--ac)}
#stateBar .st-info{font-size:.72rem;color:var(--mu)}
#stateBar .st-link{color:var(--ac);text-decoration:none;font-size:.72rem;padding:.35rem .75rem;border:1px solid var(--bd);border-radius:5px;transition:all .15s}
#stateBar .st-link:hover{background:rgba(79,195,247,.1);border-color:var(--ac)}
.tabs{display:flex;justify-content:center;gap:.25rem;max-width:1200px;margin:.75rem auto 0;padding:0 2rem}
.tab{background:var(--sf);border:1px solid var(--bd);color:var(--mu);padding:.45rem 1.2rem;border-radius:6px 6px 0 0;font-size:.78rem;cursor:pointer;transition:all .15s;border-bottom:none}
.tab:hover{color:var(--tx)}.tab.active{background:var(--ac);color:#000;border-color:var(--ac);font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.25rem;max-width:1200px;margin:1rem auto;padding:0 1.5rem}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:1.5rem;transition:border-color .2s}
.card:hover{border-color:var(--ac);box-shadow:0 0 16px rgba(79,195,247,.05)}
.card h2{font-size:.8rem;color:var(--ac);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.5px}
.big-num{font-size:2rem;font-weight:700;color:var(--ac);font-family:'SF Mono','Cascadia Code',monospace;margin-bottom:.2rem}
.big-label{font-size:.68rem;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;font-size:.78rem}
.stat-label{color:var(--mu)}.stat-val{font-weight:600;font-family:'SF Mono',monospace}
.stat-sub{font-size:.65rem;color:var(--mu)}
.bar-bg{height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin:.25rem 0 .5rem;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 1s}
.race-section{max-width:1200px;margin:1rem auto;padding:0 1.5rem}
.race-bar-row{display:flex;align-items:center;margin-bottom:.4rem;gap:.6rem}
.race-label{width:190px;font-size:.74rem;text-align:right;flex-shrink:0;color:var(--tx)}
.race-bar-track{flex:1;height:24px;background:rgba(255,255,255,.03);border-radius:4px;overflow:hidden}
.race-bar-fill{height:100%;border-radius:4px;transition:width .8s ease-out;display:flex;align-items:center;padding-left:.6rem;font-size:.64rem;font-weight:600;white-space:nowrap}
.vote-bar-track{height:10px;background:rgba(255,255,255,.05);border-radius:5px;overflow:hidden;display:flex;margin:.5rem 0}
.vote-bar-dem{background:#4fc3f7;height:100%;border-radius:5px 0 0 5px}
.vote-bar-gop{background:#ff5252;height:100%;border-radius:0 5px 5px 0}
.race-pct{width:55px;font-size:.76rem;font-weight:600;font-family:'SF Mono',monospace;flex-shrink:0}
.race-count{width:75px;font-size:.68rem;color:var(--mu);flex-shrink:0;text-align:right}
.voting-section{max-width:960px;margin:0 auto 2.5rem;padding:0 1rem}
.voting-section h2{font-size:.9rem;color:var(--ac);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1rem}
.voting-table{width:100%;border-collapse:collapse;font-size:.78rem}
.voting-table th{color:var(--mu);text-transform:uppercase;font-size:.64rem;letter-spacing:.4px;padding:.6rem .8rem;text-align:center;border-bottom:1px solid var(--bd)}
.voting-table td{padding:.55rem .8rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);font-size:.76rem}
.voting-table .col-left{text-align:left;font-weight:600;color:var(--tx)}
.voting-table .dem{color:#4fc3f7}.voting-table .gop{color:#ff5252}.voting-table .other{color:var(--mu)}
.voting-table .highlight-row{background:rgba(79,195,247,.04)}
.voting-desc{font-size:.7rem;color:var(--mu);margin-bottom:1rem}
.voting-source{font-size:.65rem;color:var(--mu);margin-top:1rem}
.vote-table{max-width:1200px;margin:1rem auto;padding:0 1.5rem}
.vote-table table{width:100%;border-collapse:collapse;font-size:.74rem}
.vote-table th{color:var(--mu);text-transform:uppercase;font-size:.62rem;letter-spacing:.4px;padding:.5rem .6rem;text-align:center;border-bottom:1px solid var(--bd)}
.vote-table td{padding:.4rem .5rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.04);font-size:.72rem}
.vote-table .race-col{text-align:left;color:var(--tx);font-weight:500}
.vote-table .dem{color:#4fc3f7}.vote-table .gop{color:#ff5252}.vote-table .other{color:var(--mu)}
.vote-table .highlight-row{background:rgba(79,195,247,.04)}
.year-selector{display:flex;justify-content:center;gap:.4rem;margin-bottom:2rem}
.year-btn{background:var(--sf);border:1px solid var(--bd);color:var(--mu);padding:.35rem 1.2rem;border-radius:5px;font-size:.78rem;cursor:pointer;transition:all .15s}
.year-btn:hover{color:var(--tx)}.year-btn.active{background:var(--ac);color:#000;border-color:var(--ac);font-weight:600}
.city-search{position:relative;max-width:500px;margin:.75rem auto}
.city-search input{width:100%;background:var(--sf);border:1px solid var(--bd);color:var(--tx);padding:.45rem .9rem;border-radius:6px;font-size:.78rem;outline:none}
.city-search input:focus{border-color:var(--ac)}
.city-search input::placeholder{color:var(--mu)}
.city-dropdown{display:none;position:absolute;top:100%;left:0;right:0;max-height:240px;overflow-y:auto;background:#12121e;border:1px solid var(--bd);border-top:none;border-radius:0 0 6px 6px;z-index:100}
.city-dropdown.show{display:block}
.city-dropdown .item{padding:.4rem .8rem;font-size:.74rem;cursor:pointer;transition:background .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.city-dropdown .item:hover,.city-dropdown .item.active{background:rgba(79,195,247,.12);color:var(--ac)}
.city-dropdown .no-results,.city-dropdown .loading{padding:.5rem .8rem;font-size:.72rem;color:var(--mu);text-align:center}
.export-btn{background:var(--sf);border:1px solid var(--bd);color:var(--mu);padding:.35rem .7rem;border-radius:5px;font-size:.7rem;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.export-btn:hover{color:var(--ac);border-color:var(--ac);background:rgba(79,195,247,.08)}
footer{text-align:center;color:var(--mu);padding:1.5rem;font-size:.68rem;border-top:1px solid var(--bd);margin-top:1.5rem}
#crimeContainer{max-width:1200px;margin:0 auto;padding:0 1.5rem}
.loading-msg{text-align:center;color:var(--mu);padding:2rem;font-size:.85rem}
@media(max-width:768px){.race-bar-row{flex-wrap:wrap}.race-label{width:100%;text-align:left;margin-bottom:.1rem}.grid{grid-template-columns:1fr!important;padding:0 .75rem}.tabs{padding:0 .5rem;gap:.1rem}.tab{padding:.35rem .7rem;font-size:.68rem}#stateBar{flex-direction:column;align-items:center}}
</style>
</head>
<body>

  <h1>📊 US Census & Crime Dashboard</h1>
  <div class="sub">US Census ACS 2023 · FBI CDE Arrest Data 2022 · Presidential Elections 2016–2024</div>
  <div id="stateBar">

<div id="tabCensus">
  <div class="grid" id="popCards"></div>
  <div class="race-section" id="raceSection"></div>
  <div class="grid" id="detailGrid"></div>
</div>

  <div id="crimeContainer"></div>
</div>

  <div id="votingContainer"></div>
</div>

<footer>
  Data: US Census Bureau ACS 2023 5-Year · FBI Crime Data Explorer 2022 · MIT Election Lab / CNN Exit Polls<br>
  <a href="https://github.com/djlilbooduh/census-dashboard" style="color:var(--ac)">census-dashboard on GitHub</a>

<script>
// ════════ STATE MANAGEMENT ═══════=
const STATES = {"AL": "Alabama", "AK": "Alaska", "AZ": "Arizona", "AR": "Arkansas", "CA": "California", "CO": "Colorado", "CT": "Connecticut", "DE": "Delaware", "FL": "Florida", "GA": "Georgia", "HI": "Hawaii", "ID": "Idaho", "IL": "Illinois", "IN": "Indiana", "IA": "Iowa", "KS": "Kansas", "KY": "Kentucky", "LA": "Louisiana", "ME": "Maine", "MD": "Maryland", "MA": "Massachusetts", "MI": "Michigan", "MN": "Minnesota", "MS": "Mississippi", "MO": "Missouri", "MT": "Montana", "NE": "Nebraska", "NV": "Nevada", "NH": "New Hampshire", "NJ": "New Jersey", "NM": "New Mexico", "NY": "New York", "NC": "North Carolina", "ND": "North Dakota", "OH": "Ohio", "OK": "Oklahoma", "OR": "Oregon", "PA": "Pennsylvania", "RI": "Rhode Island", "SC": "South Carolina", "SD": "South Dakota", "TN": "Tennessee", "TX": "Texas", "UT": "Utah", "VT": "Vermont", "VA": "Virginia", "WA": "Washington", "WV": "West Virginia", "WI": "Wisconsin", "WY": "Wyoming"};
let currentState = 'CA';
let currentCity = 'Los Angeles city, California';
let allCities = {};
let allCityKeys = [];
let allCityData = {};
let countyData = null;
let countyVoting = {};
let cityCountyMap = {};
let arrestData = {};
let crimeLoaded = false;
let currentTab = 'census';
let currentNationalYear = '2024';
let cityCountyReady = false;
let activeIdx = -1;

function getDataURL(st, type) {
  const prefix = st.toLowerCase();
  if (type === 'census') return prefix + '_census.json';
  if (type === 'voting') return prefix + '_voting.json';
  if (type === 'arrest') return prefix + '_arrests.json';
  return '';
}

async function loadStateData(st) {
  currentState = st;
  document.getElementById('stateInfo').textContent = 'Loading ' + STATES[st] + '…';
  document.getElementById('citySearch').placeholder = '🔍 Loading cities…';
  document.getElementById('mapLink').href = st.toLowerCase() + '_map.html';
  
  try {
    const cr = await fetch(getDataURL(st, 'census') + '?t=' + Date.now());
    const census = await cr.json();
    allCityData = census.cities || {};
    allCities = allCityData;
    allCityKeys = Object.keys(allCityData).sort();
    currentCity = allCityKeys[0] || '';
    
    const n = allCityKeys.length;
    document.getElementById('citySearch').placeholder = '🔍 Search ' + n + ' cities in ' + STATES[st] + '…';
    document.getElementById('stateInfo').textContent = n + ' cities';
    
    crimeLoaded = false;
    arrestData = {};
    document.getElementById('crimeContainer').innerHTML = '';
    
    try {
      const vr = await fetch(getDataURL(st, 'voting') + '?t=' + Date.now());
      const vdata = await vr.json();
      countyVoting = vdata.counties || vdata || {};
      if (vdata.counties) {
        const firstKey = Object.keys(vdata.counties)[0];
        if (firstKey && firstKey.match(/^\\d{5}$/)) {
          countyData = { counties: vdata.counties, keyType: 'fips' };
        } else {
          countyData = { counties: vdata.counties, keyType: 'name' };
        }
      }
    } catch(e) {
      countyVoting = {};
      countyData = null;
    }
    
    if (currentCity) renderCurrentCity();
    window.location.hash = st;
    
  } catch(e) {
    document.getElementById('stateInfo').textContent = '\u26a0\ufe0f Error loading ' + STATES[st];
    document.getElementById('popCards').innerHTML = '<div class="card loading-msg"><p>\u26a0\ufe0f Could not load data for ' + STATES[st] + '</p><p style="font-size:.72rem">' + e.message + '</p></div>';
  }
}

function selectState(st) { loadStateData(st); }

function cleanCityName(full) {
  return full.replace(/\s+(city|town|CDP|village|borough|municipality),\s*\w+$/i, '');
}

function fmt(n) { return n ? n.toLocaleString() : '0'; }

function normalizeVotingData(vdata) {
  // Convert any voting format into {county_key: {presidential: {year: {dem_pct, gop_pct, ...}}}}
  var out = {};
  var counties = null;
  
  // Standard: vdata.counties
  if (vdata.counties) {
    counties = vdata.counties;
  }
  // AK: borough_results
  else if (vdata.borough_results) {
    counties = vdata.borough_results;
  }
  // KY: top-level list
  else if (Array.isArray(vdata)) {
    counties = vdata;
  }
  // MD/RI: nested presidential.counties
  else if (vdata.presidential && vdata.presidential.counties) {
    counties = vdata.presidential.counties;
  }
  
  if (!counties) return out;
  
  // Handle list format
  if (Array.isArray(counties)) {
    counties.forEach(function(c) {
      var key = c.name || c.county || c.fips || '';
      if (key) out[key] = normalizeCountyEntry(c);
    });
    return out;
  }
  
  // Handle dict format
  Object.entries(counties).forEach(function(e) {
    var key = e[0], val = e[1];
    if (typeof val === 'object') out[key] = normalizeCountyEntry(val);
  });
  
  return out;
}

function normalizeCountyEntry(c) {
  // If it already has presidential, return as-is
  if (c.presidential) return c;
  
  // Convert president_2024 format
  if (c.president_2024 || c.harris_pct) {
    var pres = {};
    ['2024','2020','2016'].forEach(function(yr) {
      var key = yr === '2024' ? 'president_2024' : 'presidential_' + yr;
      var pd = c[key] || (yr === '2024' ? c : null);
      if (pd) {
        pres[yr] = {
          dem_pct: pd.harris_pct || pd.dem_pct || 0,
          gop_pct: pd.trump_pct || pd.gop_pct || 0,
          total_votes: pd.total_votes || 0,
          turnout_pct: pd.turnout_pct || c.turnout_2024_pct || 0
        };
      }
    });
    return { name: c.name || c.county || '', presidential: pres, registration: c.registration || c.voter_registration || null };
  }
  
  // Minimal: just has harris_pct/trump_pct at top level
  if (c.harris_pct) {
    return { name: c.name || '', presidential: { '2024': { dem_pct: c.harris_pct, gop_pct: c.trump_pct, total_votes: c.total_votes || 0 } } };
  }
  
  return c;
}

function renderCurrentCity() {
  const d = allCityData[currentCity];
  if (!d) {
    document.getElementById('popCards').innerHTML = '<div class="card loading-msg">No data available</div>';
    return;
  }
  if (currentTab === 'census') renderCensus();
  else if (currentTab === 'crime') renderCrime();
  else if (currentTab === 'voting') renderVoting(currentNationalYear);
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    if (t.textContent.includes(tab === 'census' ? 'Census' : tab === 'crime' ? 'Crime' : 'Voting')) t.classList.add('active');
  });
  document.getElementById('tabCensus').style.display = tab === 'census' ? '' : 'none';
  document.getElementById('tabCrime').style.display = tab === 'crime' ? '' : 'none';
  document.getElementById('tabVoting').style.display = tab === 'voting' ? '' : 'none';
  if (currentCity && allCityData[currentCity]) renderCurrentCity();
  if (tab === 'crime' && !crimeLoaded) loadCrimeData();
}

function renderCensus() {
  const d = allCityData[currentCity];
  if (!d) return;
  document.getElementById('popCards').innerHTML = `
    <div class="card" style="text-align:center"><div class="big-label">Total Population</div><div class="big-num">${fmt(d.population?.total || 0)}</div><div class="stat-sub">${cleanCityName(currentCity)} · ACS ${d.year || '2023'}</div></div>
    <div class="card" style="text-align:center"><div class="big-label">Voting Age (18+)</div><div class="big-num">${fmt(d.population?.voting_age || 0)}</div><div class="stat-sub">${d.population?.voting_age_pct || 0}% of population</div></div>
    <div class="card" style="text-align:center"><div class="big-label">Median Income</div><div class="big-num">$${fmt(d.economics?.median_household_income || 0)}</div><div class="stat-sub">${d.year || '2023'} inflation-adjusted</div></div>
    <div class="card" style="text-align:center"><div class="big-label">Poverty Rate</div><div class="big-num" style="color:var(--cf)">${d.economics?.poverty_pct || 0}%</div><div class="stat-sub">${fmt(d.economics?.poverty_count || 0)} below poverty line</div></div>`;
  const race = d.race || [];
  const colors = ['#4fc3f7','#ffab40','#66bb6a','#ff5252','#ce93d8','#8888aa','#80cbc4','#a1887f'];
  let rh = '<div class="card"><h2>🧑 Race & Ethnicity — ' + cleanCityName(currentCity) + '</h2>';
  race.forEach((r, i) => {
    const c = r.color || colors[i % colors.length];
    rh += '<div class="race-bar-row"><div class="race-label">' + r.group + '</div><div class="race-bar-track"><div class="race-bar-fill" style="width:' + r.pct + '%;background:' + c + ';color:' + (r.pct>10?'#fff':c) + '">' + (r.pct>=5?r.pct+'%':'') + '</div></div><div class="race-pct" style="color:' + c + '">' + r.pct + '%</div><div class="race-count">' + fmt(r.count) + '</div></div>';
  });
  rh += '</div>';
  document.getElementById('raceSection').innerHTML = rh;
  const edu = d.education || {};
  const eduTotal = edu.bachelors_or_higher || 0;
  const popEst = (d.population?.total || 1) * 0.75;
  const eduPct = popEst > 0 ? (eduTotal / popEst * 100).toFixed(1) : 0;

async function loadCrimeData() {
  if (crimeLoaded) return;
  document.getElementById('crimeContainer').innerHTML = '<div class="loading-msg">🔄 Loading arrest data for ' + STATES[currentState] + '…</div>';
  try {
    const r = await fetch(getDataURL(currentState, 'arrest') + '?t=' + Date.now());
    const raw = await r.json();
    arrestData = raw.cities || raw || {};
    crimeLoaded = true;
    if (currentTab === 'crime') renderCrime();
  } catch(e) {
    document.getElementById('crimeContainer').innerHTML = '<div class="card" style="text-align:center"><h2>🛡️ Crime</h2><p style="color:var(--mu)">Could not load arrest data for ' + STATES[currentState] + '</p><p style="color:var(--mu);font-size:.7rem">' + e.message + '</p></div>';
  }
}

function renderCrime() {
  if (!crimeLoaded) { loadCrimeData(); return; }
  const a = arrestData[currentCity];
  if (!a || a.total_arrests === 0 || a.note) {
    document.getElementById('crimeContainer').innerHTML = '<div class="card" style="text-align:center"><h2>🛡️ Crime & Safety</h2><p style="color:var(--mu);margin-top:.5rem">No arrest data for ' + cleanCityName(currentCity) + '</p><p style="color:var(--mu);font-size:.7rem;margin-top:.5rem">Small cities often contract with county sheriffs and do not report independently to the FBI.</p></div>';
    return;
  }
  let html = '';
  
  // Check for multi-year data
  const hasMultiYear = a.years && Object.keys(a.years).length > 1;
  let selectedYear = (a.year || '2022').toString();
  let yearData = a;
  
  if (hasMultiYear) {
    const years = Object.keys(a.years).sort();
    if (!years.includes(selectedYear)) selectedYear = years[years.length - 1];
    yearData = a.years[selectedYear] || a;
    html += '<div class="year-selector" style="margin-bottom:1.5rem">';
    years.forEach(y => {
      html += '<div class="year-btn' + (y === selectedYear ? ' active' : '') + '" data-year="' + y + '" onclick="switchCrimeYear(\'' + y + '\')">' + y + '</div>';
    });
    html += '</div>';
    
    // Trend bars
    const totals = years.map(y => a.years[y]?.total_arrests || 0);
    const maxTotal = Math.max(...totals, 1);
    html += '<div class="card" style="max-width:960px;margin:0 auto 1rem;text-align:center"><h2>📈 Arrest Trends · ' + years[0] + '–' + years[years.length-1] + '</h2>';
    html += '<div style="display:flex;align-items:flex-end;justify-content:center;gap:1.5rem;height:120px;padding:1rem 0">';
    years.forEach((y, i) => {
      const h = Math.max(8, (totals[i] / maxTotal) * 100);
      const color = totals[i] > (totals[i-1] || 0) ? '#ff5252' : '#66bb6a';
      const delta = i > 0 ? ((totals[i] - totals[i-1]) / Math.max(1, totals[i-1]) * 100).toFixed(1) : '0';
      const arrow = i > 0 ? (totals[i] > totals[i-1] ? '↑' : '↓') : '';
      html += '<div style="text-align:center"><div style="font-size:.65rem;color:var(--mu);margin-bottom:.25rem">' + fmt(totals[i]) + '</div>';
      html += '<div style="width:40px;height:' + h + 'px;background:' + color + ';border-radius:4px 4px 0 0;margin:0 auto;transition:height .5s"></div>';
      html += '<div style="font-size:.65rem;font-weight:600;margin-top:.25rem;color:' + (i > 0 ? color : 'var(--mu)') + '">' + y + (i>0?' <span style="font-size:.55rem">' + arrow + delta + '%</span>':'') + '</div></div>';
    });
    html += '</div></div>';
  }
  
  const total = yearData.total_arrests || 0;
  const pop = allCityData[currentCity]?.population?.total || 1;
  const rate = (total / pop * 1000).toFixed(1);
  const sex = yearData.sex || {};
  html += '<div class="grid" style="grid-template-columns:1fr 1fr 1fr 1fr">';
  const rateVal = total / pop * 1000;
  const rateLabel = rateVal < 5 ? 'Low' : rateVal < 15 ? 'Moderate' : rateVal < 30 ? 'High' : 'Very High';
  const rateColor = rateVal < 5 ? '#66bb6a' : rateVal < 15 ? '#ffab40' : rateVal < 30 ? '#ff8c00' : '#ff5252';
  const malePct = (sex.Male||0) / Math.max(1, (sex.Male||0)+(sex.Female||0)) * 100;
  const femalePct = (sex.Female||0) / Math.max(1, (sex.Male||0)+(sex.Female||0)) * 100;
  html += '<div class="card" style="text-align:center"><div class="big-label">Arrest Rate per 1,000</div>';
  html += '<div class="big-num" style="color:' + rateColor + ';font-size:2.4rem">' + rateVal.toFixed(1) + '</div>';
  html += '<div style="font-size:.75rem;font-weight:600;color:' + rateColor + ';margin-top:.25rem">' + rateLabel + '</div>';
  html += '<div class="stat-sub" style="margin-top:.5rem">' + fmt(total) + ' arrests / ' + fmt(pop) + ' residents</div></div>';
  html += '<div class="card" style="text-align:center"><div class="big-label">Total Arrests (2022)</div><div class="big-num" style="font-size:1.8rem">' + fmt(total) + '</div><div class="stat-sub">FBI CDE ' + (a.year || '2022') + '</div></div>';
  html += '<div class="card" style="text-align:center"><div class="big-label">Male Arrestees</div><div class="big-num" style="font-size:1.8rem;color:#4fc3f7">' + fmt(sex.Male || 0) + '</div><div class="stat-sub">' + malePct.toFixed(1) + '% of arrests</div></div>';
  html += '<div class="card" style="text-align:center"><div class="big-label">Female Arrestees</div><div class="big-num" style="font-size:1.8rem;color:#ffab40">' + fmt(sex.Female || 0) + '</div><div class="stat-sub">' + femalePct.toFixed(1) + '% of arrests</div></div></div>';
  const gaugePct = Math.min(100, rateVal / 50 * 100);
  html += '<div class="card" style="max-width:960px;margin:1rem auto;text-align:center"><h2>📊 Arrest Rate Comparison</h2><div style="display:flex;align-items:center;gap:.5rem;margin:1rem 0"><span style="font-size:.65rem;color:#66bb6a;width:40px">Low</span><div style="flex:1;height:16px;background:linear-gradient(to right,#66bb6a,#ffab40,#ff8c00,#ff5252);border-radius:8px;position:relative;overflow:visible"><div style="position:absolute;top:-4px;left:' + gaugePct + '%;width:24px;height:24px;background:#fff;border-radius:50%;border:3px solid ' + rateColor + ';transform:translateX(-50%);box-shadow:0 0 8px ' + rateColor + '"></div></div><span style="font-size:.65rem;color:#ff5252;width:70px;text-align:right">Very High</span></div><div style="display:flex;justify-content:space-between;font-size:.6rem;color:var(--mu);padding:0 44px 0 44px"><span>0</span><span>5</span><span>15</span><span>30</span><span>50+</span></div><p class="stat-sub" style="margin-top:.75rem">' + cleanCityName(currentCity) + ': <strong style="color:' + rateColor + '">' + rateVal.toFixed(1) + ' per 1,000</strong> — ' + rateLabel + '</p></div>';
  const race = yearData.race || {};
  const raceColors = {'White':'#4fc3f7','Black or African American':'#ff5252','Asian':'#66bb6a','American Indian or Alaska Native':'#a1887f','Native Hawaiian or Other Pacific Islander':'#80cbc4','Unknown':'#8888aa','Multiple':'#ce93d8','Not Specified':'#8888aa'};
  if (Object.keys(race).length > 0) {
    const raceSorted = Object.entries(race).sort((a,b) => b[1] - a[1]);
    const raceTotal = raceSorted.reduce((s, r) => s + r[1], 0) || 1;
    html += '<div class="card" style="max-width:800px;margin:1rem auto"><h2>🧑 Arrest Demographics by Race</h2>';
    raceSorted.forEach(([g, c]) => {
      const pct = (c / raceTotal * 100).toFixed(1);
      const color = raceColors[g] || '#888';
      html += '<div class="race-bar-row"><div class="race-label">' + g + '</div><div class="race-bar-track"><div class="race-bar-fill" style="width:' + Math.max(1,parseFloat(pct)) + '%;background:' + color + ';color:' + (parseFloat(pct)>10?'#fff':color) + '">' + (parseFloat(pct)>=5?pct+'%':'') + '</div></div><div class="race-pct" style="color:' + color + '">' + pct + '%</div><div class="race-count">' + fmt(c) + '</div></div>';
    });
    html += '</div>';
  }
  const offenses = yearData.offenses || yearData.offense_categories || {};
  if (Object.keys(offenses).length > 0) {
    const topOff = Object.entries(offenses).sort((a,b) => b[1] - a[1]).slice(0, 10);
    html += '<div class="card" style="max-width:800px;margin:1rem auto"><h2>📋 Top Offense Categories</h2>';
    topOff.forEach(([cat, cnt]) => { html += '<div class="stat-row"><span class="stat-label">' + cat + '</span><span class="stat-val">' + fmt(cnt) + ' <span style="font-size:.7rem;color:var(--mu);font-weight:400">(' + (cnt/pop*1000).toFixed(2) + '/1k)</span></span></div>'; });
    html += '</div>';
  }
  html += '<div style="text-align:center;color:var(--mu);font-size:.62rem;margin:1rem">Source: FBI Crime Data Explorer · ' + selectedYear + ' · ORI: ' + (a.ori || 'N/A') + '</div>';
  document.getElementById('crimeContainer').innerHTML = html;
}

function switchCrimeYear(year) {
  // Update selected year in the city's arrest data and re-render
  const a = arrestData[currentCity];
  if (a && a.years) {
    a._selectedYear = year;
    renderCrime();
  }
}

function findCountyVote() {
  if (!cityCountyReady) return null;
  const stMap = cityCountyMap[currentState] || {};
  const shortName = cleanCityName(currentCity) + ', ' + currentState;
  const countyInfo = stMap[shortName] || stMap[currentCity];
  if (!countyInfo || !countyData) return null;
  const countyFips = countyInfo.county_fips || '';
  if (countyData.keyType === 'fips' && countyFips) return countyData.counties[countyFips] || null;
  const countyName = countyInfo.county || '';
  if (countyName && countyData.counties) {
    for (const [k, v] of Object.entries(countyData.counties)) {
      if (k.includes(countyName) || (v.name || '').includes(countyName)) return v;
    }
  }
  return null;
}

function renderVoting(year) {
  currentNationalYear = year;
  const d = NATIONAL_VOTE[year];
  if (!d) return;
  
  const cv = findCountyVote();
  let cp = null;
  if (cv && cv.presidential && cv.presidential[year]) cp = cv.presidential[year];
  const reg = cv && cv.registration ? cv.registration : null;
  
  let html = '<div class="year-selector" style="margin-bottom:2rem">';
  Object.keys(NATIONAL_VOTE).forEach(y => {
    html += '<div class="year-btn' + (y==year?' active':'') + '" data-year="' + y + '" onclick="renderVoting(this.dataset.year)">' + y + ' Election</div>';
  });
  html += '</div>';
  
  // State-level aggregation
  let stateTotal = null;
  if (countyVoting && Object.keys(countyVoting).length > 0) {
    const countyList = Object.values(countyVoting).filter(function(v) { return v && v.presidential && v.presidential[year]; });
    if (countyList.length > 0) {
      stateTotal = { dem: 0, gop: 0, votes: 0 };
      countyList.forEach(function(c) {
        var p = c.presidential[year];
        stateTotal.votes += p.total_votes || 0;
        stateTotal.dem += (p.dem_pct || 0) * (p.total_votes || 1);
        stateTotal.gop += (p.gop_pct || 0) * (p.total_votes || 1);
      });
      if (stateTotal.votes > 0) {
        stateTotal.dem = +(stateTotal.dem / stateTotal.votes).toFixed(1);
        stateTotal.gop = +(stateTotal.gop / stateTotal.votes).toFixed(1);
      }
    }
  }
  
  // State overview cards
  if (stateTotal) {
    var sM = (stateTotal.dem||0) - (stateTotal.gop||0);
    var sL = sM > 0 ? 'D+' + sM.toFixed(1) : 'R+' + Math.abs(sM).toFixed(1);
    var sC = sM > 0 ? 'var(--ac)' : 'var(--sc)';
    var ev = ELECTORAL_VOTES[currentState] || '?';

    html += '<div class="stat-sub">🟦 ' + stateTotal.dem.toFixed(1) + '% · 🟥 ' + stateTotal.gop.toFixed(1) + '%</div>';
    html += '<div class="stat-sub">' + (stateTotal.votes||0).toLocaleString() + ' total votes</div></div>';
    html += '<div class="card" style="text-align:center"><div class="big-label">Electoral Votes</div>';

  html += '<p class="voting-desc">National exit poll data showing how different demographic groups voted</p>';
  html += '<table class="voting-table"><thead><tr>';
  html += '<th class="col-left" style="width:22%">Group</th><th style="width:12%">Share of<br>Electorate</th><th style="width:12%">Dem</th><th style="width:12%">GOP</th><th style="width:14%">Margin</th><th style="width:12%">Other</th><th style="width:16%">Turnout</th></tr></thead><tbody>';
  d.race_vote.forEach((r, i) => {
    const cls = i % 2 === 0 ? ' highlight-row' : '';
    const m = r.dem - r.gop;
    html += '<tr class="' + cls + '"><td class="col-left"><strong>' + r.race + '</strong></td>';
    html += '<td>' + r.sh + '%</td>';
    html += '<td class="dem"><strong>' + r.dem + '%</strong></td>';
    html += '<td class="gop"><strong>' + r.gop + '%</strong></td>';
    html += '<td style="color:' + (m>0?'var(--ac)':'var(--sc)') + ';font-weight:600">' + (m>0?'D+':'R+') + Math.abs(m) + '</td>';
    html += '<td class="other">' + r.other + '%</td>';
    html += '<td>' + r.to + '%</td></tr>';
  });
  html += '</tbody></table>';
  html += '<p class="voting-source">Source: ' + year + ' National Exit Polls · CNN / Edison Research</p></div></div>';
  
  document.getElementById('votingContainer').innerHTML = html;
}

// City search functions
function filterCityDropdown() {
  const q = document.getElementById('citySearch').value.toLowerCase().trim();
  const dd = document.getElementById('cityDropdown');
  if (!q) { dd.classList.remove('show'); return; }
  const matches = allCityKeys.filter(k => k.toLowerCase().includes(q)).slice(0, 30);
  if (matches.length === 0) {
    dd.innerHTML = '<div class="no-results">No cities match</div>';
  } else {
    dd.innerHTML = matches.map((k, i) => '<div class="item' + (i===0?' active':'') + '" data-city="' + k.replace(/"/g, '&quot;') + '" onmousedown="selectCity(this.dataset.city)">' + k + '</div>').join('');
  }
  dd.classList.add('show');
  activeIdx = 0;
}

function showCityDropdown() {
  document.getElementById('cityDropdown').classList.add('show');
  if (!document.getElementById('cityDropdown').innerHTML) filterCityDropdown();
}

function handleCityKey(e) {
  const dd = document.getElementById('cityDropdown');
  const items = dd.querySelectorAll('.item');
  if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); updateActive(items); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); updateActive(items); }
  else if (e.key === 'Enter') { e.preventDefault(); if (items[activeIdx]) items[activeIdx].click(); }
  else if (e.key === 'Escape') { dd.classList.remove('show'); }
}

function updateActive(items) {
  items.forEach((item, i) => item.classList.toggle('active', i === activeIdx));
  const active = items[activeIdx];
  if (active) active.scrollIntoView({ block: 'nearest' });
}

function selectCity(key) {
  currentCity = key;
  document.getElementById('citySearch').value = key;
  document.getElementById('cityDropdown').classList.remove('show');
  renderCurrentCity();
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.city-search')) document.getElementById('cityDropdown').classList.remove('show');
});

function exportCSV() {
  const d = allCityData[currentCity];
  if (!d) return;
  const rows = [['Field', 'Value']];
  rows.push(['City', cleanCityName(currentCity)]);
  rows.push(['Population', d.population?.total || 0]);
  rows.push(['Voting Age', d.population?.voting_age || 0]);
  rows.push(['Median Income', d.economics?.median_household_income || 0]);
  rows.push(['Poverty Rate', d.economics?.poverty_pct + '%']);
  (d.race || []).forEach(r => rows.push(['Race: ' + r.group, r.pct + '% (' + r.count + ')']));
  const csv = rows.map(r => '"' + r.join('","') + '"').join('\n');
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = cleanCityName(currentCity).replace(/[^a-zA-Z0-9]/g, '_') + '_census.csv';
  a.click();
}
